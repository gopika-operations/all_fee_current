<!doctype html>
<html lang="vi">
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Tra cứu doanh thu hôm nay</title>

<style>
  :root{
    --bg:#0b1220;
    --card:#111b2a;
    --text:#e8eefc;
    --muted:#94a3b8;
    --line:#1e2a40;
    --field:#0e1625;
    --brand:#17C795;
    --brand-600:#11b489;
    --logo:#FF8B22;
  }

  html,body{
    margin:0;
    background:var(--bg);
    color:var(--text);
    font:16px/1.55 system-ui,-apple-system,Segoe UI,Roboto,"Helvetica Neue",Arial;
  }

  *,*:before,*:after{box-sizing:border-box}

  .wrap{max-width:980px;margin:32px auto;padding:0 18px}
  h1{font-size:34px;margin:0 0 18px;font-weight:800;letter-spacing:.2px}

  .card{
    background:var(--card);
    border-radius:16px;
    padding:18px 18px 20px;
    box-shadow:0 8px 22px rgba(0,0,0,.25);
  }

  .row{
    display:grid;
    grid-template-columns:1fr 1fr auto;
    gap:14px;
    align-items:end;
  }

  @media (max-width:640px){
    .row{grid-template-columns:1fr;align-items:stretch}
  }

  .field{display:flex;flex-direction:column;gap:8px}
  .help{color:var(--muted);font-size:.92rem}

  input{
    width:100%;
    height:48px;
    padding:12px 14px;
    border-radius:12px;
    border:1px solid #22314a;
    background:var(--field);
    color:var(--text);
    outline:none;
    transition:border-color .2s, box-shadow .2s;
  }

  input::placeholder{color:#6b7c98}
  input:focus{
    border-color:var(--brand);
    box-shadow:0 0 0 3px rgba(23,199,149,.15);
  }

  .action{align-self:end}

  .btn{
    height:48px;
    min-width:170px;
    padding:0 18px;
    border:0;
    border-radius:12px;
    background:var(--brand);
    color:#06151a;
    font-weight:750;
    letter-spacing:.2px;
    cursor:pointer;
    box-shadow:0 6px 16px rgba(23,199,149,.25);
    transition:transform .08s ease, box-shadow .2s ease, background .15s ease;
  }

  .btn:hover{background:var(--brand-600)}
  .btn:active{transform:translateY(1px);box-shadow:0 3px 10px rgba(23,199,149,.2)}
  .btn:disabled{opacity:.6;cursor:not-allowed}

  .err{color:#fda4af;margin-top:12px;min-height:1.35em}
  .status{color:var(--muted);margin-top:12px;min-height:1.35em}

  table{
    width:100%;
    border-collapse:collapse;
    margin-top:16px;
    background:var(--field);
    border-radius:14px;
    overflow:hidden;
  }

  th,td{
    padding:13px 16px;
    border-bottom:1px solid var(--line);
  }

  th{
    width:40%;
    text-align:left;
    background:#0c1422;
    color:#cbd5e1;
    font-weight:700;
  }

  td{color:#e6edf7}
</style>

<body>
<div class="wrap">
  <h1>Tra cứu doanh thu</h1>

  <div class="card">
    <div class="row">
      <div class="field">
        <input id="driverId" inputmode="numeric" placeholder="SĐT / ID">
        <div class="help">Nhập số điện thoại đăng kí app đầu 84</div>
      </div>

      <div class="field">
        <input id="driverName" placeholder="Họ và tên">
        <div class="help">Nhập đúng họ và tên của bạn</div>
      </div>

      <div class="action">
        <button id="btn" class="btn" onclick="lookup()">Tra cứu</button>
      </div>
    </div>

    <div id="status" class="status"></div>
    <div id="msg" class="err"></div>
<div id="result"></div>

<div id="dailyWrap" style="display:none;margin-top:18px;">
  <h3 style="margin:0 0 12px;font-size:18px;">Doanh thu theo ngày</h3>
  <div id="dailyList" class="daily-grid"></div>
</div>
  </div>
</div>

<script>
  const API_URL = 'https://script.google.com/macros/s/AKfycbztEPgAKTl1Ayrhet5eecchQYgKtW6f69LLYbB8SiJtG5W5WL5Qjx9MVU8Dqe3cvuLY/exec';

  const $ = id => document.getElementById(id);
  const btn = $('btn');
  const msg = $('msg');
  const out = $('result');
  const statusEl = $('status');

  function escapeHtml(s){
    return String(s ?? '').replace(/[&<>"']/g, c => ({
      '&':'&amp;',
      '<':'&lt;',
      '>':'&gt;',
      '"':'&quot;',
      "'":'&#39;'
    }[c]));
  }

  function renderDaily(daily){
  if(!daily || !daily.length){
    dailyWrap.style.display = 'none';
    dailyList.innerHTML = '';
    return;
  }

  let html = '';
  daily.forEach(item => {
    const feeText = String(item.fee ?? '').trim();
    if (!String(item.date ?? '').trim()) return;

    html += `
      <div class="daily-card">
        <div class="daily-date">${escapeHtml(item.date)}</div>
        <div class="daily-fee">${escapeHtml(feeText || '0')}</div>
      </div>
    `;
  });

  dailyList.innerHTML = html;
  dailyWrap.style.display = html ? '' : 'none';
}

  function setBusy(b){
    btn.disabled = b;
    btn.textContent = b ? 'Đang tra cứu...' : 'Tra cứu';
  }

  async function loadStatus(){
    try{
      const url = `${API_URL}?fn=status&_=${Date.now()}`;
      const r = await fetch(url, { cache:'no-store' });
      const data = await r.json();

      if(data.ok && data.lastUpdate){
        statusEl.textContent = `Cập nhật gần nhất: ${data.lastUpdate}`;
      }
    }catch(e){
      statusEl.textContent = '';
    }
  }

  async function lookup(){
    const id = $('driverId').value.replace(/\s+/g,'').trim();
    const name = $('driverName').value.trim();

    msg.textContent=''; 
out.innerHTML=''; 
dailyWrap.style.display = 'none';
dailyList.innerHTML = '';
setBusy(true);

    if(!id || !name){
      msg.textContent = 'Vui lòng nhập đủ SĐT / ID và họ tên.';
      setBusy(false);
      return;
    }

    try{
      const url = `${API_URL}?fn=lookup&id=${encodeURIComponent(id)}&name=${encodeURIComponent(name)}&_=${Date.now()}`;
      const r = await fetch(url, { cache:'no-store' });
      const data = await r.json();

      if(!data.ok){
        msg.textContent = data.error || 'Hiện tại chưa ghi nhận tx hoàn thành đơn hàng trong ngày. Vui lòng thử lại sau';
        if (data.lastUpdate) {
          statusEl.textContent = `Cập nhật gần nhất: ${data.lastUpdate}`;
        }
        setBusy(false);
        return;
      }

      const rec = data.record || {};
      let html = '<table>';

      Object.keys(rec).forEach(k => {
        const value = rec[k];
        const text = String(value ?? '').trim();

        if (text === '' || text === '-') return;

        html += `<tr><th>${escapeHtml(k)}</th><td>${escapeHtml(text)}</td></tr>`;
      });

      html += '</table>';
      out.innerHTML = html;
      renderDaily(data.daily || []);

    }catch(e){
      msg.textContent = 'Lỗi kết nối. Vui lòng thử lại.';
    }finally{
      setBusy(false);
    }
  }

  ['driverId','driverName'].forEach(id => {
    $(id).addEventListener('keydown', e => {
      if(e.key === 'Enter') lookup();
    });
  });

  loadStatus();
</script>
</body>
</html>
